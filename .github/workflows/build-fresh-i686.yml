name: CI — Build & Release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# Prevent parallel runs: a new nightly cancels a stale one.
concurrency:
  group: ci-build-release
  cancel-in-progress: true

jobs:
  # ── 1. CHECK ────────────────────────────────────────────────────────────────
  check-upstream:
    name: Check upstream release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Read-only: only needs to query the API, not write anything.
    permissions:
      contents: read
    outputs:
      upstream_tag: ${{ steps.get_tag.outputs.UPSTREAM_TAG }}
      should_build: ${{ steps.get_tag.outputs.SHOULD_BUILD }}
    steps:
      - name: Compare upstream tag with our latest release
        id: get_tag
        run: |
          UPSTREAM_TAG=$(curl -sf https://api.github.com/repos/sinelaw/fresh/releases/latest | jq -r .tag_name)
          OUR_LATEST_TAG=$(curl -sf https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name 2>/dev/null || echo "none")
          echo "Upstream tag : $UPSTREAM_TAG"
          echo "Our latest   : $OUR_LATEST_TAG"

          if [ -z "$UPSTREAM_TAG" ] || [ "$UPSTREAM_TAG" = "null" ]; then
            echo "Upstream release not found."
            echo "SHOULD_BUILD=false" >> $GITHUB_OUTPUT
          elif [ -z "$OUR_LATEST_TAG" ] || [ "$OUR_LATEST_TAG" = "null" ] || [ "$OUR_LATEST_TAG" = "none" ]; then
            echo "No existing release — first build."
            echo "UPSTREAM_TAG=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            echo "SHOULD_BUILD=true"          >> $GITHUB_OUTPUT
          elif [ "$UPSTREAM_TAG" = "$OUR_LATEST_TAG" ]; then
            echo "Already up to date."
            echo "SHOULD_BUILD=false" >> $GITHUB_OUTPUT
          else
            echo "New release: $UPSTREAM_TAG (have: $OUR_LATEST_TAG)"
            echo "UPSTREAM_TAG=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            echo "SHOULD_BUILD=true"          >> $GITHUB_OUTPUT
          fi

  # ── 2. BUILD ────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.variant }})
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Read-only during build; only the release job needs write.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: k8-sse3
            target_cpu: k8-sse3
          - variant: pentium4
            target_cpu: pentium4

    steps:
      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: sinelaw/fresh
          ref: ${{ needs.check-upstream.outputs.upstream_tag }}

      - name: Install Rust ${{ env.RUST_VERSION }}
        # Using an exact version for fully reproducible builds.
        uses: dtolnay/rust-toolchain@1.94.0
        env:
          RUST_VERSION: "1.94.0"

      - name: Add i686 musl target
        run: rustup target add i686-unknown-linux-musl

      - name: Install Zig 0.13.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Cache cargo-zigbuild
        id: cache-zigbuild
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-0.19-${{ runner.os }}

      - name: Install cargo-zigbuild
        if: steps.cache-zigbuild.outputs.cache-hit != 'true'
        run: cargo install cargo-zigbuild --version "^0.19"

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-i686-${{ matrix.variant }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-i686-${{ matrix.variant }}-

      - name: Build fresh-${{ matrix.variant }}
        env:
          CARGO_PROFILE_RELEASE_LTO: "fat"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          RUSTFLAGS: >-
            -C target-cpu=${{ matrix.target_cpu }}
            -C embed-bitcode=yes
            -C panic=abort
            -C llvm-args=-align-all-functions=4
            -C link-arg=-s
        run: |
          cargo zigbuild --target i686-unknown-linux-musl --release
          mv target/i686-unknown-linux-musl/release/fresh fresh-${{ matrix.variant }}

      - name: Verify binary
        run: |
          test -f fresh-${{ matrix.variant }} \
            || { echo "::error::Binary fresh-${{ matrix.variant }} not found"; exit 1; }
          file fresh-${{ matrix.variant }}
          ls -lh fresh-${{ matrix.variant }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.variant }}
          path: fresh-${{ matrix.variant }}

  # ── 3. RELEASE ──────────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: [check-upstream, build]
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Write access is scoped to this single job only.
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts
          merge-multiple: true

      - name: Verify both artifacts are present
        run: |
          test -f artifacts/fresh-k8-sse3  \
            || { echo "::error::fresh-k8-sse3 missing";  exit 1; }
          test -f artifacts/fresh-pentium4 \
            || { echo "::error::fresh-pentium4 missing"; exit 1; }
          ls -lh artifacts/

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: sha256sum fresh-k8-sse3 fresh-pentium4 > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-upstream.outputs.upstream_tag }}
          name: Fresh IDE ${{ needs.check-upstream.outputs.upstream_tag }} (i686 Optimized)
          body: |
            Automated build of Fresh IDE for older 32-bit processors (i686).

            | Binary | Target | Requires |
            |--------|--------|----------|
            | `fresh-k8-sse3` | AMD K8 / Sempron (Socket 754/939) | SSE3 (`pni`) |
            | `fresh-pentium4` | Pentium 4 and compatible | SSE2 only |

            Statically compiled via `musl` + `zig` with fat LTO.
            Built with Rust 1.94.0.

            **Verify download:**
            ```sh
            sha256sum -c SHA256SUMS
            ```
          files: |
            artifacts/fresh-k8-sse3
            artifacts/fresh-pentium4
            artifacts/SHA256SUMS
