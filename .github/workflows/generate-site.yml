name: CI — Sync docs

on:
  push:
    branches: [main]
    paths:
      - README.md
  workflow_dispatch:

# Only one sync at a time; a new push cancels the previous run.
concurrency:
  group: ci-sync-docs
  cancel-in-progress: true

jobs:
  sync:
    name: README → index.md
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index.md from README.md
        run: |
          python3 - <<'EOF'
          import re

          with open('README.md', 'r') as f:
              text = f.read()

          # Drop the H1 title line (GitHub shows it; site has its own titlebar)
          text = re.sub(r'^# .+\n', '', text, count=1)

          # Drop badge lines — lines of the form [![...](...)...]
          text = re.sub(r'^\[!\[.*\n', '', text, flags=re.MULTILINE)

          # Strip leading blank lines left behind
          text = text.lstrip('\n')

          front_matter = (
              '---\n'
              'layout: default\n'
              'title: "fresh-editor \u2014 i686 builds"\n'
              '---\n\n'
          )

          with open('index.md', 'w') as f:
              f.write(front_matter + text)

          print('index.md generated from README.md')
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.md
          git diff --cached --quiet \
            || git commit -m "chore: sync index.md from README.md [skip ci]"
          git push
